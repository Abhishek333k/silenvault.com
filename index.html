<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SilenVault | Privacy-First Ecosystem</title>
    <meta name="description" content="SilenVault: An advanced ecosystem of client-side tools, premium digital assets, and zero-data web games.">
    <link rel="icon" type="image/webp" href="/assets/img/SILENVAULT_CREST.webp">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: sans-serif; 
            color: #fff; 
            overflow-x: hidden; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }
        #webgl-container { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: -1; 
            background-color: #030712; 
        }
        .content { 
            z-index: 10; 
            text-align: center; 
            padding: 3rem; 
            background: rgba(0, 0, 0, 0.4); 
            border-radius: 12px; 
            backdrop-filter: blur(10px);
            margin-top: auto; 
            margin-bottom: auto; 
        }
        .brand-logo { 
            max-height: 100px; 
            margin-bottom: 3rem; 
        }
        .links { 
            display: flex; 
            gap: 3rem; 
            justify-content: center; 
        }
        .links a { 
            color: #fff; 
            text-decoration: none; 
            font-size: 1.2rem; 
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.2s; 
        }
        .links a:hover { opacity: 0.6; }

        /* Corporate Profile Styles */
        .corporate-profile {
            margin-top: 4rem;
            text-align: left;
            border-top: 1px solid rgba(0, 240, 255, 0.2);
            padding-top: 3rem;
        }
        .corporate-profile section {
            margin-bottom: 3rem;
        }
        .corporate-profile h2 {
            font-size: 1.8rem;
            color: #00f0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }
        .corporate-profile p {
            font-size: 1.1rem;
            color: #cbd5e1;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .corporate-profile strong {
            color: #fff;
        }
        
        footer {  
            margin-top: auto; 
            padding: 2rem; 
            text-align: center; 
            width: 100%; 
            z-index: 10; 
        }
        footer a { 
            color: #aaa; 
            text-decoration: none; 
            margin: 0 1rem; 
            font-size: 0.9rem; 
        }
        footer a:hover { color: #fff; }

        #cmp-banner { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(0,0,0,0.9); 
            padding: 1.5rem; 
            text-align: center; 
            z-index: 9999; 
            border-top: 1px solid #333; 
        }
        #cmp-banner span { color: #ccc; }
        #cmp-banner button { 
            margin-left: 1rem; 
            padding: 0.5rem 1.5rem; 
            cursor: pointer; 
            background: #fff; 
            border: none; 
            color: #000; 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="webgl-container"></div>

    <div class="content" style="background: transparent; backdrop-filter: none; border: none; box-shadow: none; padding: 4rem;">
        <img src="/assets/img/BANNER.webp" alt="SilenVault Banner" class="brand-logo" style="margin-bottom: 2rem;">
        <h1 style="color: #00f0ff; font-family: 'Orbitron', 'Rajdhani', sans-serif; letter-spacing: 6px; text-transform: uppercase; text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);">System Offline</h1>
        <p style="color: #cbd5e1; font-size: 1.1rem; margin-top: 1.5rem; letter-spacing: 2px; text-transform: uppercase;">Infrastructure undergoing scheduled maintenance.</p>
        <p style="color: #64748b; font-size: 0.9rem; margin-top: 2rem; font-family: monospace;">ERR_CODE: OFFLINE_MAINTENANCE_MODE</p>
    </div>

    <script>
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        
        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 10;
        }
        
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const material = new THREE.PointsMaterial({
            size: 0.005,
            color: 0x00f0ff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const particlesMesh = new THREE.Points(particlesGeometry, material);
        scene.add(particlesMesh);
        camera.position.z = 3;

        let mouseX = 0;
        let mouseY = 0;
        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) - 0.5;
            mouseY = (event.clientY / window.innerHeight) - 0.5;
        });

        const animate = () => {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.001;
            particlesMesh.rotation.x += 0.001;
            particlesMesh.rotation.y += mouseX * 0.05;
            particlesMesh.rotation.x += mouseY * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });


    </script>
</body>
</html>
